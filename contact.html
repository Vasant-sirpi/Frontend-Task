<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="styles.css">

</head>

<body class="bg-gray-100">

<header class="bg-blue-700 text-white">

<div class="container mx-auto flex justify-between items-center p-5">

<h1 class="text-3xl font-bold">

My Company

</h1>

<nav>

<ul class="flex gap-8">

<li><a href="index.html" class="nav-link">Home</a></li>

<li><a href="about.html" class="nav-link">About</a></li>

<li><a href="contact.html" class="nav-link">Contact</a></li>

</ul>

</nav>

</div>

</header>

<section class="container mx-auto py-16 px-6">

<div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-lg">

<h2 class="text-4xl font-bold text-center text-blue-700 mb-8">

Contact Us

</h2>

<form>

<div class="mb-5">

<label class="block mb-2">Name</label>

<input
type="text"
class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>

<div class="mb-5">

<label class="block mb-2">Email</label>

<input
type="email"
class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>

<div class="mb-5">

<label class="block mb-2">Message</label>

<textarea
rows="5"
class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>

</div>

<button
type="submit"
class="btn">

Submit

</button>

</form>

</div>

</section>

<footer class="bg-pink-700 text-white text-center py-4">

© 2026 My Company. All Rights Reserved.

</footer>

</body>

</html>
